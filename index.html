<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Task Bloom: To-Do List</title>
    <link rel="stylesheet" href="css/styles.css"/>
    <script src="js/script.js" defer></script>

</head>
<body>
    <main class="app">
        <!-- App header section -->
         <header class="app-header">
            <h1>Task Bloom</h1>
            <p class="subtitle">Stay organized, finish tasks, and keep blooming 🌸</p>
         </header>

    
        <!-- Input section -->
        <section class = "input-section">
            <label for="todoInput" class="sr-only">Enter a to-do item</label>
            <input type="text" id="todoInput" placeholder="Add a new task..." maxlength="100"/>
            
            <!-- Button to Add Task -->
            <button id="addBtn">Add Task</button>
        </section>


</main>
</body>
</html>
