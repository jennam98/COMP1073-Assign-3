<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Task Bloom: To-Do List</title>
    <link rel="stylesheet" href="css/styles.css"/>
    <script src="js/script.js" defer></script>

</head>
<body>
    <main class="app">
        <!-- App header section -->
         <header class="app-header">
            <h1>Task Bloom</h1>
            <p class="subtitle">Stay organized, finish tasks, and keep blooming 🌸</p>
         </header>

    
        <!-- Input section -->
        <section class = "input-section">
            <label for="todoInput" class="sr-only">Enter a to-do item</label>
            <input type="text" id="todoInput" placeholder="Add a new task..." maxlength="100"/>
            
            <!-- Button to Add Task -->
            <button id="addBtn">Add Task</button>
        </section>

        <!-- Filter Task Section -->
         <section class="filter-section">
            <button class="filter-btn active-filter" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
         </section>

        <!-- Clear Task Section -->
        <section class="extras">
            <button id="clearCompletedBtn" class="secondary-btn">Clear Completed</button>
            <button id="clearAllBtn" class="danger-btn">Clear All</button>
        </section>

        <!-- Statistics Section -->
        <section class="stats">
            <p>Total Tasks: <span id="totalTasks">0</span></p>
            <p>Completed: <span id="completedTasks">0</span></p>
            <p>Remaining: <span id="remainingTasks">0</span></p>
        </section>

        <!-- List Section -->

         <section class="list-section">
            <ul id="todoList"></ul>
            <p id="emptyMessage" class="empty-message">No tasks yet. Add one to get started.</p>
        </section>
</main>


</body>
</html>
